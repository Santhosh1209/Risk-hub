bundle:
  name: risk-signal-hub

resources:
  apps:
    risk-signal-hub-api:
      name: risk-signal-hub-api
      description: Risk Signal Hub Backend API
      resources:
        - backend/app.yaml
      compute:
        cpu: 2
        memory: 4g
      environment_variables:
        DATABRICKS_HOST: "{{secrets/risk-signal-hub/DATABRICKS_HOST}}"
        DATABRICKS_TOKEN: "{{secrets/risk-signal-hub/DATABRICKS_TOKEN}}"
        SQL_WAREHOUSE_ID: "{{secrets/risk-signal-hub/SQL_WAREHOUSE_ID}}"
        GENIE_SPACE_ID: "{{secrets/risk-signal-hub/GENIE_SPACE_ID}}"
        CATALOG: "risk_hub"
        SCHEMA: "fraud"

    risk-signal-hub-ui:
      name: risk-signal-hub-ui
      description: Risk Signal Hub Frontend
      resources:
        - frontend/app.yaml
      compute:
        cpu: 1
        memory: 2g
