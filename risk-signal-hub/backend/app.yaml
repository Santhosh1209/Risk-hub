build:
  commands:
    - cd ../frontend && npm ci && npm run build

command:
  - uvicorn
  - main:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: GMAIL_SENDER
    valueFrom: gmail:GMAIL_SENDER
  - name: GMAIL_APP_PASS
    valueFrom: gmail:GMAIL_APP_PASS
  - name: SQL_WAREHOUSE_ID
    valueFrom: riskhub:SQL_WAREHOUSE_ID
  - name: GENIE_SPACE_ID
    valueFrom: riskhub:GENIE_SPACE_ID
